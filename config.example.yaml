# ==============================
# WeChat Web Client 配置示例
# 复制为 config.yaml 后按实际环境修改
# ==============================

# 本后端的公网 IP 或域名。远程客户端 Hook 没有公网 IP，
# 由客户端 DLL 主动连接到这个地址。
ip: "127.0.0.1"

# 远程服务所需的 RDV/鉴权标识，按实际服务填写
RDV: ""

# 微信使用方式（三选一）
#   1 = 本地 Hook（DLL 注入本地微信，127.0.0.1）
#   2 = 远程客户端 Hook（客户端 DLL 无公网 IP，主动连本后端 WS/WSS）
#   3 = 远程服务器协议（服务器上运行的微信协议）
wechat_mode: 1

# --- local_hook 本地 Hook ---
local_hook_host: "127.0.0.1"
local_hook_api_port: 30001
local_hook_mgr_port: 29999

# --- remote_hook 远程客户端 Hook ---
# agent_ws_enabled=true 时通过下方 /agent 长连接调用 DLL；
# 这些 host/port 仅作为关闭 agent_ws_enabled 时的旧 HTTP 直连配置。
remote_hook_host: "127.0.0.1"
remote_hook_api_port: 30001
remote_hook_mgr_port: 29999

# --- remote_protocol 远程协议 ---
remote_protocol_host: "127.0.0.1"
remote_protocol_api_port: 30001
remote_protocol_mgr_port: 29999

# --- 后端服务 ---
server_port: 5000
# Web 前端访问密钥；浏览器需先输入该 key 才能访问聊天页和 API。
# 不要把真实密钥提交到 Git，可在 config.yaml 或 WECHAT_WEB_ACCESS_KEY 中配置。
web_access_key: ""
# Hook/API 并发数：本地 Hook 建议 1；远程 Hook/远程协议可设为 5-20。
# 不配置时本地 Hook 默认 1，远程模式默认 10。
hook_api_concurrency: 10

# --- 前端服务 ---
# start-all.sh 会优先读取 frontend_port；也可用环境变量 FRONTEND_PORT 临时覆盖。
frontend_port: 3001

# --- 远程客户端 DLL 主动连接到本后端的 WS/WSS 长连接 ---
# 无证书测试：client_wss_scheme="ws"，client_wss_port=5000，
#   DLL 使用 RemoteWS="ws://1.14.149.2:5000/agent"，可直连 server_port。
# 正式部署：client_wss_scheme="wss"，client_wss_port=443，
#   DLL 使用 RemoteWS="wss://1.14.149.2/agent"，需 Nginx/Caddy 等提供 TLS 证书并转发到 server_port。
agent_ws_enabled: true
agent_ws_path: "/agent"
client_wss_scheme: "wss"
client_wss_host: "127.0.0.1"
client_wss_port: 443
agent_ws_request_timeout: 30

# --- 回调 ---
# callback_port: 远程客户端 Hook 回调本后端的端口，需要能被客户端出站访问
callback_port: 8000
callback_path: "/receiveChatBotMsg/msg"
# 消息接收类型：
#   1 = Hook 直接返回 msglist
#   2 = protobuf/raw pb_msg
recvtype: 1

# --- 登录流程行为开关 ---
restart_on_button_login_fail: true
max_restarts_after_button_login_fail: 1
